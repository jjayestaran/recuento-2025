<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Recuento 2025 - Grupo Maestra</title>
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- React y Babel -->
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <!-- Lucide Icons -->
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700;800&display=swap');
        body { 
            font-family: 'Inter', sans-serif; 
            scroll-behavior: smooth; 
            -webkit-font-smoothing: antialiased;
        }
        .active-link { 
            color: #db0a5b !important; 
            border-left: 4px solid #db0a5b !important; 
            background-color: #f8fafc; 
            font-weight: 700; 
        }
    </style>
</head>
<body class="bg-slate-50 text-slate-900 text-left">
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useRef } = React;

        const LOGO_URL = "https://maestra.cl/wp-content/themes/maestra-2022/img/logo-maestra-main.svg";
        const COLORS = {
            navy: "#1e293b", 
            red: "#db0a5b", 
            green: "#10b981",
            brandNavy: "#003b71" 
        };

        const Icon = ({ name, size = 20, className = "" }) => {
            useEffect(() => {
                if (window.lucide) {
                    window.lucide.createIcons();
                }
            }, []);
            return <i data-lucide={name} className={className} style={{ width: size, height: size }}></i>;
        };

        const HitoCard = ({ children, title, icon, color = COLORS.brandNavy }) => (
            <div className="bg-white p-6 md:p-8 rounded-xl border border-slate-100 shadow-sm hover:shadow-md transition-all flex flex-col h-full text-left">
                <div className="flex items-start gap-4">
                    <div className="p-2 rounded-lg shrink-0" style={{ backgroundColor: `${color}10`, color: color }}>
                        <Icon name={icon} size={24} />
                    </div>
                    <div className="flex-1">
                        <h4 className="font-bold text-slate-800 mb-2 text-lg md:text-xl leading-tight">{title}</h4>
                        <div className="text-slate-500 text-sm md:text-base leading-relaxed">{children}</div>
                    </div>
                </div>
            </div>
        );

        const SectionHeading = ({ title, subtitle }) => (
            <div className="mb-10 md:mb-12 text-left">
                <h2 className="text-3xl md:text-4xl font-extrabold mb-4 tracking-tight" style={{ color: COLORS.brandNavy }}>{title}</h2>
                <div className="w-16 h-1.5 rounded-full mb-5" style={{ backgroundColor: COLORS.red }}></div>
                <p className="text-slate-500 max-w-3xl italic text-base md:text-lg leading-relaxed">{subtitle}</p>
            </div>
        );

        const MetricCard = ({ title, subtitle, accent = false }) => (
            <div className="text-white p-6 md:p-8 rounded-2xl flex flex-col justify-center border-b-4 shadow-lg transition-transform hover:scale-[1.02] text-left h-full" 
                 style={{ 
                     backgroundColor: accent ? COLORS.brandNavy : COLORS.navy, 
                     borderBottomColor: COLORS.red 
                 }}>
                <span className="text-xl md:text-2xl font-extrabold mb-2 tracking-tight leading-tight">
                    {title}
                </span>
                <span className="text-xs md:text-sm text-slate-300 font-medium leading-tight">
                    {subtitle}
                </span>
            </div>
        );

        const App = () => {
            const [activeSection, setActiveSection] = useState('inicio');
            const [isMobileMenuOpen, setIsMobileMenuOpen] = useState(false);

            const sections = [
                { id: 'inicio', label: 'Estrategia Corporativa', icon: 'trending-up' },
                { id: 'inmobiliario', label: 'Gestión Inmobiliaria y Comercial', icon: 'building-2' },
                { id: 'constructora', label: 'Constructora y Área Técnica', icon: 'hard-hat' },
                { id: 'finanzas', label: 'Estructura de Capital y Financiamiento', icon: 'dollar-sign' },
                { id: 'internacional', label: 'Proyectos en Miami', icon: 'globe' },
                { id: 'cultura', label: 'Cultura, Clima y Legal', icon: 'users' },
            ];

            useEffect(() => {
                const handleScroll = () => {
                    const scrollPosition = window.scrollY + 250;
                    sections.forEach(section => {
                        const element = document.getElementById(section.id);
                        if (element && element.offsetTop <= scrollPosition && element.offsetTop + element.offsetHeight > scrollPosition) {
                            setActiveSection(section.id);
                        }
                    });
                };
                window.addEventListener('scroll', handleScroll);
                return () => window.removeEventListener('scroll', handleScroll);
            }, []);

            const scrollTo = (id) => {
                const element = document.getElementById(id);
                if (element) {
                    window.scrollTo({ top: element.offsetTop - 40, behavior: 'smooth' });
                    setIsMobileMenuOpen(false);
                }
            };

            return (
                <div className="min-h-screen flex flex-col md:flex-row bg-slate-50 text-left">
                    
                    {/* Sidebar Desktop - Tipografía aumentada */}
                    <nav className="fixed left-0 top-0 h-full w-64 bg-white border-r border-slate-200 z-50 hidden md:flex flex-col shadow-sm">
                        <div className="p-8 flex flex-col h-full">
                            <img src={LOGO_URL} alt="Logo Maestra" className="h-12 w-auto mb-10 object-contain self-start" />
                            <div className="space-y-2 overflow-y-auto pr-2 text-left">
                                {sections.map((s) => (
                                    <button key={s.id} onClick={() => scrollTo(s.id)}
                                        className={`w-full flex items-center gap-3 px-4 py-3 rounded-lg transition-all text-sm md:text-base text-left ${activeSection === s.id ? 'active-link' : 'text-slate-500 hover:bg-slate-50'}`}>
                                        <Icon name={s.icon} size={20} />
                                        <span>{s.label}</span>
                                    </button>
                                ))}
                            </div>
                            <div className="mt-auto pt-8 border-t border-slate-100 text-left">
                                <p className="text-[11px] text-slate-400 font-extrabold uppercase tracking-widest text-left">RECUENTO 2025</p>
                            </div>
                        </div>
                    </nav>

                    {/* Menú Móvil Overlay */}
                    {isMobileMenuOpen && (
                        <div className="fixed inset-0 bg-[#001a33] z-[100] md:hidden flex flex-col p-8 overflow-y-auto">
                            <div className="flex justify-between items-center mb-12 text-left">
                                <img src={LOGO_URL} alt="Logo Maestra" className="h-8 brightness-0 invert" />
                                <button onClick={() => setIsMobileMenuOpen(false)} className="text-white p-2 border border-white/20 rounded-full">
                                    <Icon name="x" size={24} />
                                </button>
                            </div>
                            <div className="space-y-4 text-left">
                                {sections.map((s) => (
                                    <button key={s.id} onClick={() => scrollTo(s.id)} 
                                        className={`w-full text-left flex items-center gap-4 py-4 border-b border-white/10 ${activeSection === s.id ? 'text-white font-bold' : 'text-slate-400'}`}>
                                        <Icon name={s.icon} size={24} style={{ color: activeSection === s.id ? COLORS.red : "inherit" }} />
                                        <span className="text-xl">{s.label}</span>
                                    </button>
                                ))}
                            </div>
                        </div>
                    )}

                    <main className="flex-1 md:ml-64 p-6 md:px-16 md:pb-24 max-w-7xl mx-auto w-full overflow-x-hidden text-left">
                        
                        {/* HERO SECTION */}
                        <section id="inicio" className="flex flex-col justify-start pt-8 md:pt-20 pb-12 md:pb-20 text-left">
                            <div className="md:hidden flex justify-start mb-10 text-left">
                                <img src={LOGO_URL} alt="Logo Maestra" className="h-10 w-auto object-contain" />
                            </div>

                            <div className="inline-block px-4 py-1.5 rounded-full text-[10px] md:text-[12px] font-black tracking-[0.2em] uppercase mb-10 shadow-sm self-start" style={{ backgroundColor: `${COLORS.red}10`, color: COLORS.red }}>
                                RECUENTO ANUAL MAESTRA 2025
                            </div>
                            
                            <h1 className="text-3xl md:text-6xl font-extrabold leading-[1.2] mb-14 tracking-tight text-left max-w-5xl" style={{ color: COLORS.brandNavy }}>
                                Después de años muy difíciles, comenzamos a ver el futuro con <span className="underline decoration-4 underline-offset-[10px]" style={{ textDecorationColor: COLORS.red }}>optimismo...</span>
                            </h1>
                            
                            <div className="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 gap-8">
                                <MetricCard 
                                    title="Consolidación de propiedad de los controladores" 
                                    subtitle="Compra de participación a JAM y PS" 
                                />
                                <MetricCard 
                                    title="Utilidad M$ 5.069" 
                                    subtitle="Antes de impuesto (vs -M$ 8.731 en 2024)." 
                                />
                                <MetricCard 
                                    title="Alianzas Estratégicas" 
                                    subtitle="Establecimos relaciones con MINVU y Serviu" 
                                />
                            </div>
                        </section>

                        {/* GESTIÓN INMOBILIARIA Y COMERCIAL */}
                        <section id="inmobiliario" className="py-12 md:py-20 border-t border-slate-200 text-left">
                            <SectionHeading 
                                title="Gestión Inmobiliaria y Comercial" 
                                subtitle="Acuerdos comerciales, nuevos proyectos y adjudicaciones estratégicas" 
                            />
                            
                            <div className="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-4 gap-6 md:gap-8 mb-16 text-left">
                                <MetricCard 
                                    title="Nueva Gerencia Comercial" 
                                    subtitle="Asume Santiago Prado" 
                                />
                                <MetricCard 
                                    title="Venta Padre Hurtado" 
                                    subtitle="540 mUF por escrituración de 273 unidades." 
                                />
                                <MetricCard 
                                    title="Venta de 97 unidades arriendo precio justo" 
                                    subtitle="Venta de stock por 230 mUF para programa estatal." 
                                />
                                <MetricCard 
                                    title="Adjudicación DS19 Lira IV" 
                                    subtitle="Proyecto con Ingresos proyectados por UF 680 mil." 
                                />
                            </div>

                            <div className="grid grid-cols-1 md:grid-cols-2 gap-8 md:gap-12 mb-10 text-left">
                                <div className="space-y-8 flex flex-col text-left">
                                    <HitoCard title="Mejora Operacional" icon="trending-up" color={COLORS.red}>
                                        Optimización en procesos de escrituración y mejoras críticas en el cobro de Mutuos y Pie para asegurar el flujo de caja operativo de la compañía.
                                    </HitoCard>
                                    <div className="bg-white p-8 rounded-xl border-l-4 shadow-sm h-auto" style={{ borderLeftColor: COLORS.red }}>
                                        <h4 className="font-bold text-xl mb-5 flex items-center gap-3 text-slate-800"><Icon name="heart" className="text-emerald-500" size={24} /> Maestra Social</h4>
                                        <ul className="space-y-5 text-sm md:text-base text-slate-600 font-medium text-left">
                                            <li className="text-left">
                                                <span className="font-bold block text-slate-800 text-lg">• Adjudicación Lira IV (DS19)</span>
                                                <span className="text-sm md:text-base opacity-75">Postulación y adjudicación exitosa del proyecto.</span>
                                            </li>
                                            <li className="text-left">• Implementación EP Épica</li>
                                            <li className="text-left">
                                                <span className="font-bold block text-slate-800">• Acuerdo Desarrollo (DS49):</span>
                                                <span className="text-sm md:text-base opacity-75 italic">La Compañía, Tocoral y Agua Santa.</span>
                                            </li>
                                            <li className="text-left">
                                                <span className="font-bold block text-slate-800">• Monumentos Nacionales:</span>
                                                <span className="text-sm md:text-base opacity-75 italic text-emerald-600">Aprobación Llacolén - Concepción.</span>
                                            </li>
                                        </ul>
                                    </div>
                                </div>

                                <div className="space-y-8 flex flex-col text-left">
                                    <div className="bg-white p-8 rounded-xl border-l-4 shadow-sm h-auto" style={{ borderLeftColor: COLORS.red }}>
                                        <h4 className="font-bold text-xl mb-5 flex items-center gap-3 text-slate-800"><Icon name="map-pin" className="text-emerald-500" size={24} /> Compra de terrenos con aporte</h4>
                                        <ul className="space-y-4 text-sm md:text-base text-slate-600 font-medium text-left">
                                            <li className="flex justify-between border-b border-slate-50 pb-2"><span>Vistamar-Coquimbo (194u)</span> <span className="font-bold text-slate-900 opacity-60">Rendic</span></li>
                                            <li className="flex justify-between border-b border-slate-50 pb-2"><span>Distrito Centro-Chillán (165u)</span> <span className="font-bold text-slate-900 opacity-60">Basagoitia</span></li>
                                            <li className="flex justify-between border-b border-slate-50 pb-2"><span>Alto La Serena</span> <span className="font-bold text-slate-900 opacity-60">S. Lorca</span></li>
                                            <li className="pt-3 text-left">
                                                <span className="block font-bold text-slate-800 text-lg leading-tight">Serrano-Puerto Montt (290u)</span>
                                                <span className="text-sm md:text-base text-slate-500 italic">Compra terreno e Inicio de Ventas (M. Vargas)</span>
                                            </li>
                                        </ul>
                                    </div>
                                    <div className="p-8 bg-slate-100 border-2 border-dashed border-slate-200 rounded-lg text-center flex-1 flex flex-col justify-center text-left">
                                        <p className="text-lg font-bold text-slate-900 mb-2">Consolidación Territorial</p>
                                        <p className="text-sm md:text-base text-slate-500 italic text-center">Foco en acuerdos estratégicos de aporte para optimizar el uso de capital y expansión.</p>
                                    </div>
                                </div>
                            </div>

                            <div className="w-full text-left mt-8">
                                <HitoCard title="Otros hitos relevantes" icon="layers" color={COLORS.navy}>
                                    <div className="grid grid-cols-1 md:grid-cols-2 gap-8 text-left py-2">
                                        <div>
                                            <p className="font-bold text-slate-800 uppercase text-xs md:text-sm tracking-widest mb-2">Rentas Inmobiliarias</p>
                                            <p className="text-slate-600 text-base">Venta de <strong>RentaDep</strong> a AssetPlan por un total de <strong>M$ 700</strong>.</p>
                                        </div>
                                        <div>
                                            <p className="font-bold text-slate-800 uppercase text-xs md:text-sm tracking-widest mb-2">Subsidios de Arriendo</p>
                                            <p className="text-slate-600 text-base">Implementación exitosa de subsidios <strong>DS52</strong> para optimización del portafolio.</p>
                                        </div>
                                    </div>
                                </HitoCard>
                            </div>
                        </section>

                        {/* CONSTRUCTORA Y ÁREA TÉCNICA */}
                        <section id="constructora" className="py-12 md:py-20 border-t border-slate-200 text-left">
                            <SectionHeading 
                                title="Constructora y Área Técnica" 
                                subtitle="Eficiencia operacional, área técnica y productividad líder" 
                            />

                            <div className="grid grid-cols-1 sm:grid-cols-2 gap-8 mb-16 text-left">
                                <MetricCard 
                                    title="Ventas a terceros DS19 UF 967 mil" 
                                    subtitle="2 Obras para Conavicoop" 
                                />
                                <MetricCard 
                                    title="Ventas Serviu DS49 UF 876 mil" 
                                    subtitle="Lira I y Lira II" 
                                />
                            </div>

                            <div className="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-8 text-left">
                                <HitoCard title="Inicio Obra Propia" icon="hard-hat">
                                    <p className="font-bold text-slate-800 text-lg">Vista Llacolén – Concepción</p>
                                    <p className="text-red-600 font-bold text-xl md:text-2xl mt-1">651 mUF</p>
                                    <p className="text-sm md:text-base opacity-75 mt-2">Inicio de primera etapa del proyecto.</p>
                                </HitoCard>

                                <HitoCard title="Término de Obras" icon="check-square">
                                    <ul className="space-y-3 text-slate-600 text-base text-left">
                                        <li className="flex items-center gap-2">• Pintor Cicarelli I</li>
                                        <li className="flex items-center gap-2">• Alto Buzeta</li>
                                    </ul>
                                    <p className="text-xs md:text-sm mt-5 uppercase font-bold text-emerald-600 text-left">Proyectos cuentan con RM</p>
                                </HitoCard>

                                <div className="bg-white p-8 rounded-xl border border-slate-100 shadow-sm flex flex-col justify-center text-left">
                                    <div className="flex items-center gap-3 mb-4">
                                        <Icon name="award" className="text-emerald-500" size={32} />
                                        <h4 className="font-bold text-slate-800 text-lg md:text-xl leading-tight text-left">Informe CChC – 2025</h4>
                                    </div>
                                    <p className="text-base text-slate-600 text-left leading-relaxed">Maestra destaca con obra <strong>Mirador Mapocho</strong> como referente de eficiencia.</p>
                                    <p className="text-[11px] md:text-xs text-emerald-600 mt-4 font-bold uppercase tracking-widest text-left">Eficiencia en Edificación</p>
                                </div>

                                <HitoCard title="Proyecto ULTRA" icon="zap" color={COLORS.red}>
                                    <p className="text-sm md:text-base text-slate-600 leading-relaxed text-left">Diseño, Planificación y proyectos para una potencial nueva línea de negocios estratégica.</p>
                                </HitoCard>
                                
                                <div className="bg-slate-800 p-8 rounded-xl text-white flex flex-col justify-center gap-4 shadow-lg lg:col-span-2">
                                    <div className="flex items-center gap-3">
                                        <Icon name="clipboard-check" size={32} className="text-red-400" />
                                        <h5 className="font-bold text-lg md:text-xl uppercase tracking-widest text-slate-400">Nuevas Clasificaciones Técnicas</h5>
                                    </div>
                                    <p className="text-sm md:text-base text-slate-100 leading-relaxed max-w-2xl">
                                        Validación técnica obtenida para proyectos estratégicos <strong>DS49 Lote 5A-San Felipe</strong> y <strong>Quilpué</strong>, asegurando el cumplimiento normativo.
                                    </p>
                                </div>
                            </div>
                        </section>

                        {/* ESTRUCTURA DE CAPITAL Y FINANCIAMIENTO */}
                        <section id="finanzas" className="py-12 md:py-20 border-t border-slate-200 text-left text-left">
                            <SectionHeading 
                                title="Estructura de Capital y Financiamiento" 
                                subtitle="Gestión estratégica y cumplimiento de compromisos financieros" 
                            />
                            <div className="bg-white rounded-3xl overflow-hidden shadow-2xl border border-slate-100 grid grid-cols-1 lg:grid-cols-2 text-left">
                                <div className="p-10 md:p-14 text-white bg-slate-800 text-left">
                                    <h4 className="text-2xl font-bold mb-10 flex items-center gap-3 text-left"><Icon name="dollar-sign" /> Líneas de Crédito</h4>
                                    <div className="space-y-5 text-left">
                                        {[
                                            { label: "Financiamiento Stock (Moneda/BTG)", val: 935 },
                                            { label: "Crédito puente Banco BTG (Venta PH)", val: 450 },
                                            { label: "Refinanciamiento P. Cicarelli I", val: 440 },
                                            { label: "Línea G. Mackenna (ITAU)", val: 438 },
                                            { label: "Serrano (BCI)", val: 479 },
                                            { label: "Línea Excedentes Cáceres (Santander)", val: 150 },
                                            { label: "Leasing Oficinas BCI", val: 95 }
                                        ].map((item, i) => (
                                            <div key={i} className="flex justify-between items-center border-b border-white/5 pb-2 text-left">
                                                <span className="text-slate-300 text-sm md:text-base flex-1 text-left">{item.label}</span>
                                                <span className="font-mono font-bold text-right min-w-[100px] text-lg md:text-xl" style={{ color: COLORS.red }}>{item.val} mUF</span>
                                            </div>
                                        ))}
                                        <div className="flex justify-between items-center pt-8 mt-6 border-t-2 text-left" style={{ borderColor: `${COLORS.red}40` }}>
                                            <span className="text-white font-bold text-base md:text-lg uppercase text-left">Total Financiamientos</span>
                                            <span className="font-mono text-3xl md:text-4xl font-black text-right" style={{ color: COLORS.red }}>2.987 mUF</span>
                                        </div>
                                    </div>
                                </div>
                                <div className="p-10 md:p-14 space-y-6 flex flex-col justify-center bg-white text-left">
                                    {[
                                        { num: 1, title: "Fondo Credicorp (salida y pago)", desc: "Monto total de UF 652 mil." },
                                        { num: 2, title: "Devolución MDI Dos", desc: "Retorno del 50% a inversionistas del fondo." },
                                        { num: 3, title: "Pago de KP por UF 451 mil", desc: "Cumplido íntegramente según cronograma de pagos." },
                                        { num: 4, title: "Mezzanine P. Cicarelli I", desc: "Implementación estratégica por UF 150 mil." },
                                        { num: 5, title: "Líneas de boletas para Construcción SERVIU", desc: "Garantías por 220 mUF y aseguramiento de activos estratégicos." },
                                        { num: 6, title: "PCV para venta casa de Quinchamalí", desc: "Venta por UF 27 mil exitosa." }
                                    ].map((hito) => (
                                        <div key={hito.num} className="flex items-start gap-5 p-5 rounded-xl bg-slate-50 border border-slate-100 text-left transition-colors hover:border-slate-200">
                                            <div className="w-10 h-10 rounded-full flex items-center justify-center font-bold flex-shrink-0 text-lg" style={{ backgroundColor: `${COLORS.red}15`, color: COLORS.red }}>{hito.num}</div>
                                            <div className="text-left">
                                                <p className="font-bold text-slate-900 italic text-base md:text-lg">{hito.title}</p>
                                                <p className="text-xs md:text-sm text-slate-500">{hito.desc}</p>
                                            </div>
                                        </div>
                                    ))}
                                </div>
                            </div>
                        </section>

                        {/* PROYECTOS EN MIAMI */}
                        <section id="internacional" className="py-12 md:py-20 border-t border-slate-200 text-left">
                            <SectionHeading title="Proyectos en Miami" subtitle="Vientos dejan de soplar en contra" />
                            <div className="relative h-80 md:h-[400px] rounded-3xl overflow-hidden flex items-center justify-center shadow-xl border border-slate-100 group text-left">
                                <div className="absolute inset-0 bg-cover bg-center transition-transform duration-1000 group-hover:scale-110 opacity-80" style={{ backgroundImage: `url('https://cdn.prod.website-files.com/67808ac2eb0a5516b1754b20/68a34dc9f8f8321773292c23_SD_4.jpg')` }}></div>
                                <div className="absolute inset-0 bg-gradient-to-t from-slate-900/70 to-transparent"></div>
                                <div className="relative z-10 text-center p-8 text-left">
                                    <h3 className="text-3xl md:text-5xl font-bold text-white mb-4 shadow-sm text-left">The Edge at Sunset</h3>
                                    <div className="flex flex-col gap-3 items-start text-left">
                                        <p className="text-sm md:text-base font-bold bg-white text-slate-900 px-6 py-2 rounded-full inline-block uppercase tracking-widest text-left">Inicio de Obra y Cierre ALTA</p>
                                        <p className="text-lg md:text-xl font-bold text-white drop-shadow-md text-left">Inversión Estimada: USD 130 millones</p>
                                    </div>
                                </div>
                            </div>
                        </section>

                        {/* CULTURA, CLIMA Y ASUNTOS LEGALES */}
                        <section id="cultura" className="py-12 md:py-20 border-t border-slate-200 text-left">
