<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Recuento 2025 - Grupo Maestra</title>
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- React y Babel -->
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <!-- Lucide Icons -->
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700;800&display=swap');
        body { 
            font-family: 'Inter', sans-serif; 
            scroll-behavior: smooth; 
            -webkit-font-smoothing: antialiased;
        }
        .active-link { 
            color: #db0a5b !important; 
            border-left: 4px solid #db0a5b !important; 
            background-color: #f8fafc; 
            font-weight: 700; 
        }
        /* Estilos para los fondos de sección con transparencia optimizada */
        .section-bg {
            background-size: cover;
            background-position: center;
            background-attachment: fixed;
            background-repeat: no-repeat;
        }
        .content-overlay {
            /* Transparencia a 0.75 para resaltar las imágenes de proyectos */
            background-color: rgba(248, 250, 252, 0.75);
            backdrop-filter: blur(2px);
        }
        .text-shadow-sm {
            text-shadow: 0 1px 2px rgba(255,255,255,0.8);
        }
    </style>
</head>
<body class="bg-slate-50 text-slate-900 text-left">
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useRef } = React;

        const LOGO_URL = "https://maestra.cl/wp-content/themes/maestra-2022/img/logo-maestra-main.svg";
        const COLORS = {
            navy: "#1a4675", // Azul ajustado: más cercano a marca y menos oscuro/negativo
            red: "#db0a5b", // Magenta Corporativo
            green: "#10b981",
            brandNavy: "#003b71" // Azul de marca profundo oficial
        };

        const Icon = ({ name, size = 20, className = "" }) => {
            useEffect(() => {
                if (window.lucide) {
                    window.lucide.createIcons();
                }
            }, []);
            return <i data-lucide={name} className={className} style={{ width: size, height: size }}></i>;
        };

        const HitoCard = ({ children, title, icon, color = COLORS.brandNavy }) => (
            <div className="bg-white/90 p-6 md:p-8 rounded-xl border border-slate-100 shadow-sm hover:shadow-md transition-all flex flex-col h-full text-left backdrop-blur-sm">
                <div className="flex items-start gap-4">
                    <div className="p-2 rounded-lg shrink-0" style={{ backgroundColor: `${color}10`, color: color }}>
                        <Icon name={icon} size={24} />
                    </div>
                    <div className="flex-1">
                        <h4 className="font-bold text-slate-800 mb-2 text-lg md:text-xl leading-tight">{title}</h4>
                        <div className="text-slate-600 text-sm md:text-base leading-relaxed">{children}</div>
                    </div>
                </div>
            </div>
        );

        const SectionHeading = ({ title, subtitle }) => (
            <div className="mb-10 md:mb-12 text-left">
                <h2 className="text-3xl md:text-4xl font-extrabold mb-4 tracking-tight text-shadow-sm" style={{ color: COLORS.brandNavy }}>{title}</h2>
                <div className="w-16 h-1.5 rounded-full mb-5" style={{ backgroundColor: COLORS.red }}></div>
                <p className="text-slate-700 max-w-3xl italic text-base md:text-lg leading-relaxed font-medium">{subtitle}</p>
            </div>
        );

        const MetricCard = ({ title, subtitle, accent = false }) => (
            <div className="text-white p-6 md:p-8 rounded-2xl flex flex-col justify-center border-b-4 shadow-lg transition-transform hover:scale-[1.02] text-left h-full" 
                 style={{ 
                     backgroundColor: accent ? COLORS.brandNavy : COLORS.navy, 
                     borderBottomColor: COLORS.red 
                 }}>
                <span className="text-xl md:text-2xl font-extrabold mb-2 tracking-tight leading-tight">
                    {title}
                </span>
                <span className="text-xs md:text-sm text-slate-200 font-medium leading-tight">
                    {subtitle}
                </span>
            </div>
        );

        const App = () => {
            const [activeSection, setActiveSection] = useState('inicio');
            const [isMobileMenuOpen, setIsMobileMenuOpen] = useState(false);

            const sections = [
                { id: 'inicio', label: 'Estrategia Corporativa', icon: 'trending-up' },
                { id: 'inmobiliario', label: 'Gestión Inmobiliaria y Comercial', icon: 'building-2' },
                { id: 'constructora', label: 'Constructora y Área Técnica', icon: 'hard-hat' },
                { id: 'finanzas', label: 'Estructura de Capital y Financiamiento', icon: 'dollar-sign' },
                { id: 'internacional', label: 'Proyectos en Miami', icon: 'globe' },
                { id: 'cultura', label: 'Cultura, Clima y Legal', icon: 'users' },
            ];

            useEffect(() => {
                const handleScroll = () => {
                    const scrollPosition = window.scrollY + 250;
                    sections.forEach(section => {
                        const element = document.getElementById(section.id);
                        if (element && element.offsetTop <= scrollPosition && element.offsetTop + element.offsetHeight > scrollPosition) {
                            setActiveSection(section.id);
                        }
                    });
                };
                window.addEventListener('scroll', handleScroll);
                return () => window.removeEventListener('scroll', handleScroll);
            }, []);

            const scrollTo = (id) => {
                const element = document.getElementById(id);
                if (element) {
                    window.scrollTo({ top: element.offsetTop, behavior: 'smooth' });
                    setIsMobileMenuOpen(false);
                }
            };

            return (
                <div className="min-h-screen flex flex-col md:flex-row bg-slate-50 text-left text-left">
                    
                    {/* Sidebar Desktop */}
                    <nav className="fixed left-0 top-0 h-full w-64 bg-white border-r border-slate-200 z-50 hidden md:flex flex-col shadow-sm text-left">
                        <div className="p-8 flex flex-col h-full">
                            <img src={LOGO_URL} alt="Logo Maestra" className="h-12 w-auto mb-10 object-contain self-start" />
                            <div className="space-y-2 overflow-y-auto pr-2 text-left">
                                {sections.map((s) => (
                                    <button key={s.id} onClick={() => scrollTo(s.id)}
                                        className={`w-full flex items-center gap-3 px-4 py-3 rounded-lg transition-all text-sm md:text-base text-left ${activeSection === s.id ? 'active-link' : 'text-slate-500 hover:bg-slate-50'}`}>
                                        <Icon name={s.icon} size={20} />
                                        <span>{s.label}</span>
                                    </button>
                                ))}
                            </div>
                            <div className="mt-auto pt-8 border-t border-slate-100 text-left">
                                <p className="text-[11px] text-slate-400 font-extrabold uppercase tracking-widest text-left">RECUENTO 2025</p>
                            </div>
                        </div>
                    </nav>

                    {/* Menú Móvil Overlay */}
                    {isMobileMenuOpen && (
                        <div className="fixed inset-0 bg-[#001a33] z-[100] md:hidden flex flex-col p-8 overflow-y-auto text-left">
                            <div className="flex justify-between items-center mb-12 text-left text-left">
                                <img src={LOGO_URL} alt="Logo Maestra" className="h-8 brightness-0 invert" />
                                <button onClick={() => setIsMobileMenuOpen(false)} className="text-white p-2 border border-white/20 rounded-full">
                                    <Icon name="x" size={24} />
                                </button>
                            </div>
                            <div className="space-y-4 text-left">
                                {sections.map((s) => (
                                    <button key={s.id} onClick={() => scrollTo(s.id)} 
                                        className={`w-full text-left flex items-center gap-4 py-4 border-b border-white/10 ${activeSection === s.id ? 'text-white font-bold' : 'text-slate-400'}`}>
                                        <Icon name={s.icon} size={24} style={{ color: activeSection === s.id ? COLORS.red : "inherit" }} />
                                        <span className="text-lg">{s.label}</span>
                                    </button>
                                ))}
                            </div>
                        </div>
                    )}

                    <main className="flex-1 md:ml-64 w-full overflow-x-hidden text-left">
                        
                        {/* ESTRATEGIA CORPORATIVA */}
                        <section id="inicio" className="section-bg min-h-screen" style={{ backgroundImage: "url('https://maestra.cl/wp-content/themes/maestra-2022/img/3d1b/slider-1.jpg')" }}>
                            <div className="content-overlay min-h-screen p-6 md:px-16 py-12 md:py-24 flex flex-col justify-center text-left">
                                <div className="max-w-7xl mx-auto w-full text-left">
                                    <div className="md:hidden flex justify-start mb-10 text-left">
                                        <img src={LOGO_URL} alt="Logo Maestra" className="h-10 w-auto object-contain" />
                                    </div>

                                    <div className="inline-block px-4 py-1.5 rounded-full text-[10px] md:text-[12px] font-black tracking-[0.2em] uppercase mb-10 shadow-sm self-start bg-red-50 text-[#db0a5b] text-left">
                                        RECUENTO ANUAL MAESTRA 2025
                                    </div>
                                    
                                    <h1 className="text-3xl md:text-6xl font-extrabold leading-[1.2] mb-14 tracking-tight text-left max-w-5xl text-shadow-sm" style={{ color: COLORS.brandNavy }}>
                                        Después de años muy difíciles, comenzamos a ver el futuro con <span className="underline decoration-4 underline-offset-[10px]" style={{ textDecorationColor: COLORS.red }}>optimismo...</span>
                                    </h1>
                                    
                                    <div className="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 gap-8">
                                        <MetricCard 
                                            title="Consolidación de propiedad de los controladores" 
                                            subtitle="Compra de participación a JAM y PS" 
                                        />
                                        <MetricCard 
                                            title="Utilidad M$ 5.069" 
                                            subtitle="Antes de impuesto (vs -M$ 8.731 en 2024)." 
                                        />
                                        <MetricCard 
                                            title="Alianzas Estratégicas" 
                                            subtitle="Establecimos relaciones con MINVU y Serviu" 
                                        />
                                    </div>
                                </div>
                            </div>
                        </section>

                        {/* GESTIÓN INMOBILIARIA Y COMERCIAL */}
                        <section id="inmobiliario" className="section-bg" style={{ backgroundImage: "url('https://maestra.cl/wp-content/uploads/2025/11/vistamar-galeria-update.jpg')" }}>
                            <div className="content-overlay p-6 md:px-16 py-12 md:py-24 text-left text-left">
                                <div className="max-w-7xl mx-auto w-full text-left">
                                    <SectionHeading 
                                        title="Gestión Inmobiliaria y Comercial" 
                                        subtitle="Acuerdos comerciales, nuevos proyectos y adjudicaciones estratégicas" 
                                    />
                                    
                                    <div className="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-4 gap-6 md:gap-8 mb-16 text-left">
                                        <MetricCard 
                                            title="Nueva Gerencia Comercial" 
                                            subtitle="Asume Santiago Prado" 
                                        />
                                        <MetricCard 
                                            title="Venta Padre Hurtado" 
                                            subtitle="540 mUF por escrituración de 273 unidades." 
                                        />
                                        <MetricCard 
                                            title="Venta de 97 unidades arriendo precio justo" 
                                            subtitle="Venta de stock por 230 mUF para programa estatal." 
                                        />
                                        <MetricCard 
                                            title="Adjudicación DS19 Lira IV" 
                                            subtitle="Proyecto con Ingresos proyectados por UF 680 mil." 
                                        />
                                    </div>

                                    <div className="grid grid-cols-1 md:grid-cols-2 gap-8 md:gap-12 mb-10 text-left">
                                        <div className="space-y-8 flex flex-col text-left">
                                            <HitoCard title="Mejora Operacional" icon="trending-up" color={COLORS.red}>
                                                Optimización en procesos de escrituración y mejoras críticas en el cobro de Mutuos y Pie para asegurar el flujo de caja operativo de la compañía.
                                            </HitoCard>
                                            <div className="bg-white/90 p-8 rounded-xl border border-slate-100 shadow-sm h-auto backdrop-blur-sm" style={{ borderLeftWidth: '4px', borderLeftColor: COLORS.red }}>
                                                <h4 className="font-bold text-xl mb-5 flex items-center gap-3 text-slate-800 text-left"><Icon name="heart" className="text-emerald-500" size={24} /> Maestra Social</h4>
                                                <ul className="space-y-5 text-sm md:text-base text-slate-700 font-medium text-left">
                                                    <li className="text-left text-left">
                                                        <span className="font-bold block text-slate-800 text-lg text-left">• Adjudicación Lira IV (DS19)</span>
                                                        <span className="text-sm md:text-base opacity-90 text-left">Postulación y adjudicación exitosa del proyecto.</span>
                                                    </li>
                                                    <li className="text-left">• Implementación EP Épica</li>
                                                    <li className="text-left text-left">
                                                        <span className="font-bold block text-slate-800 text-left">• Acuerdo Desarrollo (DS49):</span>
                                                        <span className="text-sm md:text-base opacity-90 italic text-left">La Compañía, Tocoral y Agua Santa.</span>
                                                    </li>
                                                    <li className="text-left text-left">
                                                        <span className="font-bold block text-slate-800 text-left">• Monumentos Nacionales:</span>
                                                        <span className="text-sm md:text-base opacity-90 italic text-emerald-700 text-left">Aprobación Llacolén - Concepción.</span>
                                                    </li>
                                                </ul>
                                            </div>
                                        </div>

                                        <div className="space-y-8 flex flex-col text-left">
                                            <div className="bg-white/90 p-8 rounded-xl border border-slate-100 shadow-sm h-auto backdrop-blur-sm" style={{ borderLeftWidth: '4px', borderLeftColor: COLORS.red }}>
                                                <h4 className="font-bold text-xl mb-5 flex items-center gap-3 text-slate-800 text-left"><Icon name="map-pin" className="text-emerald-500" size={24} /> Compra de terrenos con aporte</h4>
                                                <ul className="space-y-4 text-sm md:text-base text-slate-700 font-medium text-left">
                                                    <li className="flex justify-between border-b border-slate-100 pb-2 text-left"><span>Vistamar-Coquimbo (194u)</span> <span className="font-bold text-slate-900 opacity-60 text-left text-right">Rendic</span></li>
                                                    <li className="flex justify-between border-b border-slate-100 pb-2 text-left"><span>Distrito Centro-Chillán (165u)</span> <span className="font-bold text-slate-900 opacity-60 text-left text-right">Basagoitia</span></li>
                                                    <li className="flex justify-between border-b border-slate-100 pb-2 text-left"><span>Alto La Serena</span> <span className="font-bold text-slate-900 opacity-60 text-left text-right">S. Lorca</span></li>
                                                    <li className="pt-3 text-left text-left">
                                                        <span className="block font-bold text-slate-800 text-lg leading-tight text-left">Serrano-Puerto Montt (290u)</span>
                                                        <span className="text-sm md:text-base text-slate-600 italic text-left text-left">Compra terreno e Inicio de Ventas (M. Vargas)</span>
                                                    </li>
                                                </ul>
                                            </div>
                                            <div className="p-8 bg-white/80 border-2 border-dashed border-slate-300 rounded-lg text-center flex-1 flex flex-col justify-center text-left backdrop-blur-sm">
                                                <p className="text-lg font-bold text-slate-900 mb-2 text-left">Consolidación Territorial</p>
                                                <p className="text-sm md:text-base text-slate-700 italic text-center text-left">Foco en acuerdos estratégicos de aporte para optimizar el uso de capital y expansión estratégica.</p>
                                            </div>
                                        </div>
                                    </div>

                                    <div className="w-full text-left mt-8 text-left">
                                        <HitoCard title="Otros hitos relevantes" icon="layers" color={COLORS.navy}>
                                            <div className="grid grid-cols-1 md:grid-cols-2 gap-8 text-left py-2 text-left">
                                                <div className="text-left text-left text-left">
                                                    <p className="font-bold text-slate-800 uppercase text-xs md:text-sm tracking-widest mb-2 text-left text-left">Rentas Inmobiliarias</p>
                                                    <p className="text-slate-700 text-base text-left text-left">Venta de <strong>RentaDep</strong> a AssetPlan por un total de <strong>M$ 700</strong>.</p>
                                                </div>
                                                <div className="text-left text-left text-left">
                                                    <p className="font-bold text-slate-800 uppercase text-xs md:text-sm tracking-widest mb-2 text-left text-left">Subsidios de Arriendo</p>
                                                    <p className="text-slate-700 text-base text-left text-left">Implementación exitosa de subsidios <strong>DS52</strong> para optimización del portafolio.</p>
                                                </div>
                                            </div>
                                        </HitoCard>
                                    </div>
                                </div>
                            </div>
                        </section>

                        {/* CONSTRUCTORA Y ÁREA TÉCNICA */}
                        <section id="constructora" className="section-bg" style={{ backgroundImage: "url('https://maestra.cl/wp-content/uploads/2023/04/vista-llacolen-B-galeria-2.jpg')" }}>
                            <div className="content-overlay p-6 md:px-16 py-12 md:py-24 text-left text-left text-left">
                                <div className="max-w-7xl mx-auto w-full text-left">
                                    <SectionHeading 
                                        title="Constructora y Área Técnica" 
                                        subtitle="Eficiencia operacional, área técnica y productividad líder en edificación" 
                                    />

                                    <div className="grid grid-cols-1 sm:grid-cols-2 gap-8 mb-16 text-left">
                                        <MetricCard 
                                            title="Ventas a terceros DS19 UF 967 mil" 
                                            subtitle="2 Obras para Conavicoop" 
                                        />
                                        <MetricCard 
                                            title="Ventas Serviu DS49 UF 876 mil" 
                                            subtitle="Lira I y Lira II" 
                                        />
                                    </div>

                                    <div className="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-8 text-left">
                                        <HitoCard title="Inicio Obra Propia" icon="hard-hat">
                                            <p className="font-bold text-slate-800 text-lg text-left">Vista Llacolén – Concepción</p>
                                            <p className="text-red-600 font-bold text-xl md:text-2xl mt-1 text-left text-left">651 mUF</p>
                                            <p className="text-sm md:text-base text-slate-700 mt-2 text-left text-left">Inicio de primera etapa del proyecto.</p>
                                        </HitoCard>

                                        <HitoCard title="Término de Obras" icon="check-square">
                                            <ul className="space-y-3 text-slate-700 text-base text-left text-left">
                                                <li className="flex items-center gap-2">• Pintor Cicarelli I</li>
                                                <li className="flex items-center gap-2">• Alto Buzeta</li>
                                            </ul>
                                            <p className="text-xs md:text-sm mt-5 uppercase font-bold text-emerald-600 text-left text-left">Proyectos cuentan con RM</p>
                                        </HitoCard>

                                        <div className="bg-white/90 p-8 rounded-xl border border-slate-100 shadow-sm flex flex-col justify-center text-left backdrop-blur-sm text-left">
                                            <div className="flex items-center gap-3 mb-4 text-left text-left">
                                                <Icon name="award" className="text-emerald-500" size={32} />
                                                <h4 className="font-bold text-slate-800 text-lg md:text-xl leading-tight text-left text-left text-left text-left">Informe CChC – 2025</h4>
                                            </div>
                                            <p className="text-base text-slate-700 text-left leading-relaxed text-left text-left">Maestra destaca con obra <strong>Mirador Mapocho</strong> como referente de eficiencia.</p>
                                            <p className="text-[11px] md:text-xs text-emerald-600 mt-4 font-bold uppercase tracking-widest text-left text-left">Eficiencia en Edificación</p>
                                        </div>

                                        <HitoCard title="Proyecto ULTRA" icon="zap" color={COLORS.red}>
                                            <p className="text-sm md:text-base text-slate-700 leading-relaxed text-left text-left text-left">Diseño, Planificación y proyectos para una potencial nueva línea de negocios estratégica.</p>
                                        </HitoCard>
                                        
                                        <div className="bg-slate-800/90 p-8 rounded-xl text-white flex flex-col justify-center gap-4 shadow-lg lg:col-span-2 backdrop-blur-sm text-left text-left">
                                            <div className="flex items-center gap-3 text-left text-left">
                                                <Icon name="clipboard-check" size={32} className="text-red-400 text-left text-left" />
                                                <h5 className="font-bold text-lg md:text-xl uppercase tracking-widest text-slate-400 text-left text-left text-left text-left text-left">Nuevas Clasificaciones Técnicas</h5>
                                            </div>
                                            <p className="text-sm md:text-base text-slate-100 leading-relaxed max-w-2xl text-left text-left text-left">
                                                Validación técnica obtenida para proyectos estratégicos <strong>DS49 Lote 5A-San Felipe</strong> y <strong>Quilpué</strong>, asegurando el cumplimiento normativo.
                                            </p>
                                        </div>
                                    </div>
                                </div>
                            </div>
                        </section>

                        {/* ESTRUCTURA DE CAPITAL Y FINANCIAMIENTO */}
                        <section id="finanzas" className="section-bg" style={{ backgroundImage: "url('https://maestra.cl/wp-content/uploads/2022/10/caceres-galeria-3.jpg')" }}>
                            <div className="content-overlay p-6 md:px-16 py-12 md:py-24 text-left text-left text-left text-left">
                                <div className="max-w-7xl mx-auto w-full text-left">
                                    <SectionHeading 
                                        title="Estructura de Capital y Financiamiento" 
                                        subtitle="Gestión estratégica y cumplimiento riguroso de compromisos financieros" 
                                    />
                                    <div className="bg-white/80 rounded-3xl overflow-hidden shadow-2xl border border-slate-100 grid grid-cols-1 lg:grid-cols-2 text-left backdrop-blur-sm text-left">
                                        <div className="p-10 md:p-14 text-white bg-slate-800/95 text-left text-left text-left">
                                            <h4 className="text-2xl font-bold mb-10 flex items-center gap-3 text-left text-left text-left"><Icon name="dollar-sign" /> Líneas de Crédito</h4>
                                            <div className="space-y-5 text-left text-left text-left">
                                                {[
                                                    { label: "Financiamiento Stock (Moneda/BTG)", val: 935 },
                                                    { label: "Crédito puente Banco BTG (Venta PH)", val: 450 },
                                                    { label: "Refinanciamiento P. Cicarelli I", val: 440 },
                                                    { label: "Línea G. Mackenna (ITAU)", val: 438 },
                                                    { label: "Serrano (BCI)", val: 479 },
                                                    { label: "Línea Excedentes Cáceres (Santander)", val: 150 },
                                                    { label: "Leasing Oficinas BCI", val: 95 }
                                                ].map((item, i) => (
                                                    <div key={i} className="flex justify-between items-center border-b border-white/5 pb-2 text-left">
                                                        <span className="text-slate-300 text-sm md:text-base flex-1 text-left text-left text-left">{item.label}</span>
                                                        <span className="font-mono font-bold text-right min-w-[100px] text-lg md:text-xl" style={{ color: COLORS.red }}>{item.val} mUF</span>
                                                    </div>
                                                ))}
                                                <div className="flex justify-between items-center pt-8 mt-6 border-t-2 text-left text-left" style={{ borderColor: `${COLORS.red}40` }}>
                                                    <span className="text-white font-bold text-base md:text-lg uppercase text-left text-left text-left text-left">Total Financiamientos</span>
                                                    <span className="font-mono text-3xl md:text-4xl font-black text-right" style={{ color: COLORS.red }}>2.987 mUF</span>
                                                </div>
                                            </div>
                                        </div>
                                        <div className="p-10 md:p-14 space-y-6 flex flex-col justify-center text-left text-left">
                                            {[
                                                { num: 1, title: "Fondo Credicorp (salida y pago)", desc: "Monto total de UF 652 mil." },
