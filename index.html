<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Recuento 2025 - Grupo Maestra</title>
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- React y Babel -->
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <!-- Lucide Icons -->
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700;800&display=swap');
        body { 
            font-family: 'Inter', sans-serif; 
            scroll-behavior: smooth; 
            -webkit-font-smoothing: antialiased;
        }
        .active-link { 
            color: #db0a5b !important; 
            border-left: 4px solid #db0a5b !important; 
            background-color: #f8fafc; 
            font-weight: 700; 
        }
    </style>
</head>
<body class="bg-slate-50 text-slate-900">
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useRef } = React;

        const LOGO_URL = "https://maestra.cl/wp-content/themes/maestra-2022/img/logo-maestra-main.svg";
        const COLORS = {
            navy: "#003b71",
            red: "#db0a5b", 
            green: "#10b981",
        };

        const Icon = ({ name, size = 20, className = "" }) => {
            useEffect(() => {
                if (window.lucide) {
                    window.lucide.createIcons();
                }
            }, []);
            return <i data-lucide={name} className={className} style={{ width: size, height: size }}></i>;
        };

        const HitoCard = ({ children, title, icon, color = COLORS.navy, fullHeight = false }) => (
            <div className={`bg-white p-6 rounded-xl border border-slate-100 shadow-sm hover:shadow-md transition-all flex flex-col ${fullHeight ? 'h-full' : ''}`}>
                <div className="flex items-start gap-4">
                    <div className="p-2 rounded-lg shrink-0" style={{ backgroundColor: `${color}10`, color: color }}>
                        <Icon name={icon} size={20} />
                    </div>
                    <div className="flex-1">
                        <h4 className="font-bold text-slate-800 mb-1 leading-tight">{title}</h4>
                        <div className="text-slate-500 text-sm leading-relaxed">{children}</div>
                    </div>
                </div>
            </div>
        );

        const SectionHeading = ({ title, subtitle }) => (
            <div className="mb-8 md:mb-10">
                <h2 className="text-3xl font-extrabold mb-3 tracking-tight" style={{ color: COLORS.navy }}>{title}</h2>
                <div className="w-16 h-1.5 rounded-full mb-4" style={{ backgroundColor: COLORS.red }}></div>
                <p className="text-slate-500 max-w-2xl italic text-sm leading-relaxed">{subtitle}</p>
            </div>
        );

        const MetricCard = ({ value, label, sublabel }) => (
            <div className="text-white p-6 rounded-2xl flex flex-col justify-center border-b-4 shadow-lg transition-transform hover:scale-[1.02]" 
                 style={{ backgroundColor: COLORS.navy, borderBottomColor: COLORS.red }}>
                <span className="text-[10px] uppercase font-bold tracking-[0.2em] text-slate-300 mb-2">{label}</span>
                <span className="text-3xl font-extrabold mb-1 tracking-tight">{value}</span>
                <span className="text-xs text-slate-400 font-medium leading-tight">{sublabel}</span>
            </div>
        );

        const App = () => {
            const [activeSection, setActiveSection] = useState('inicio');
            const [isMobileMenuOpen, setIsMobileMenuOpen] = useState(false);

            const sections = [
                { id: 'inicio', label: 'Inicio', icon: 'trending-up' },
                { id: 'corporativo', label: 'Estrategia Corporativa', icon: 'landmark' },
                { id: 'inmobiliario', label: 'Gestión Inmobiliaria', icon: 'building-2' },
                { id: 'construccion', label: 'Construcción y Rentas', icon: 'hard-hat' },
                { id: 'finanzas', label: 'Estructura de Capital', icon: 'dollar-sign' },
                { id: 'internacional', label: 'Proyectos en Miami', icon: 'globe' },
                { id: 'comercial', label: 'Gestión Comercial', icon: 'briefcase' },
                { id: 'personas', label: 'Cultura y Clima', icon: 'users' },
            ];

            useEffect(() => {
                const handleScroll = () => {
                    const scrollPosition = window.scrollY + 250;
                    sections.forEach(section => {
                        const element = document.getElementById(section.id);
                        if (element && element.offsetTop <= scrollPosition && element.offsetTop + element.offsetHeight > scrollPosition) {
                            setActiveSection(section.id);
                        }
                    });
                };
                window.addEventListener('scroll', handleScroll);
                return () => window.removeEventListener('scroll', handleScroll);
            }, []);

            const scrollTo = (id) => {
                const element = document.getElementById(id);
                if (element) {
                    window.scrollTo({ top: element.offsetTop - 40, behavior: 'smooth' });
                    setIsMobileMenuOpen(false);
                }
            };

            return (
                <div className="min-h-screen flex flex-col md:flex-row">
                    
                    {/* Sidebar Desktop */}
                    <nav className="fixed left-0 top-0 h-full w-64 bg-white border-r border-slate-200 z-50 hidden md:flex flex-col shadow-sm">
                        <div className="p-8 flex flex-col h-full">
                            <img src={LOGO_URL} alt="Logo Maestra" className="h-10 w-auto mb-10 object-contain self-start" />
                            <div className="space-y-1 overflow-y-auto pr-2">
                                {sections.map((s) => (
                                    <button key={s.id} onClick={() => scrollTo(s.id)}
                                        className={`w-full flex items-center gap-3 px-4 py-3 rounded-lg transition-all text-sm text-left ${activeSection === s.id ? 'active-link' : 'text-slate-500 hover:bg-slate-50'}`}>
                                        <Icon name={s.icon} size={18} />
                                        <span>{s.label}</span>
                                    </button>
                                ))}
                            </div>
                            <div className="mt-auto pt-8 border-t border-slate-100">
                                <p className="text-[10px] text-slate-400 font-extrabold uppercase tracking-widest">RECUENTO 2025</p>
                            </div>
                        </div>
                    </nav>

                    {/* Menú Móvil Overlay */}
                    {isMobileMenuOpen && (
                        <div className="fixed inset-0 bg-[#001a33] z-[100] md:hidden flex flex-col p-8 overflow-y-auto">
                            <div className="flex justify-between items-center mb-12">
                                <img src={LOGO_URL} alt="Logo Maestra" className="h-8 brightness-0 invert" />
                                <button onClick={() => setIsMobileMenuOpen(false)} className="text-white p-2 border border-white/20 rounded-full">
                                    <Icon name="x" size={24} />
                                </button>
                            </div>
                            <div className="space-y-4">
                                {sections.map((s) => (
                                    <button key={s.id} onClick={() => scrollTo(s.id)} 
                                        className={`w-full text-left flex items-center gap-4 py-4 border-b border-white/10 ${activeSection === s.id ? 'text-white font-bold' : 'text-slate-400'}`}>
                                        <Icon name={s.icon} size={20} style={{ color: activeSection === s.id ? COLORS.red : "inherit" }} />
                                        <span className="text-lg">{s.label}</span>
                                    </button>
                                ))}
                            </div>
                        </div>
                    )}

                    {/* Contenido Principal */}
                    <main className="flex-1 md:ml-64 p-6 md:px-12 md:pb-24 max-w-6xl mx-auto w-full overflow-x-hidden">
                        
                        {/* HERO SECTION */}
                        <section id="inicio" className="flex flex-col justify-start pt-8 md:pt-16 pb-12 md:pb-16">
                            {/* Logo visible solo en móvil */}
                            <div className="md:hidden flex justify-start mb-10">
                                <img src={LOGO_URL} alt="Logo Maestra" className="h-10 w-auto object-contain" />
                            </div>

                            <div className="inline-block px-4 py-1.5 rounded-full text-[10px] font-black tracking-[0.2em] uppercase mb-8 shadow-sm self-start" style={{ backgroundColor: `${COLORS.red}10`, color: COLORS.red }}>
                                RECUENTO ANUAL MAESTRA 2025
                            </div>
                            
                            <h1 className="text-5xl md:text-7xl font-extrabold leading-[1.1] mb-10 tracking-tight" style={{ color: COLORS.navy }}>
                                Un 2025 <span className="underline decoration-4 underline-offset-[12px]" style={{ textDecorationColor: COLORS.red }}>lleno de logros</span>
                            </h1>
                            
                            <p className="text-lg md:text-xl text-slate-500 max-w-2xl mb-12 leading-relaxed">
                                Después de un 2023-2024 extraordinariamente complejo, las cosas comienzan a verse con optimismo
                            </p>
                            
                            <div className="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 gap-6">
                                <MetricCard label="Utilidad 2025" value="M$ 5.069" sublabel="Antes de impuestos" />
                                <MetricCard label="Satisfacción Laboral" value="79%" sublabel="Sobre promedio de mercado" />
                                <MetricCard label="Productividad" value="Líder CChC" sublabel="En obra Mirador Mapocho" />
                            </div>
                        </section>

                        {/* CORPORATIVO */}
                        <section id="corporativo" className="py-12 md:py-16 border-t border-slate-200">
                            <SectionHeading 
                                title="Visión Corporativa" 
                                subtitle="Socios comprometidos y relaciones estratégicas de largo plazo" 
                            />
                            <div className="grid grid-cols-1 md:grid-cols-2 gap-6">
                                <HitoCard title="Consolidación de los controladores" icon="arrow-up-right">
                                    Consolidación de la estructura societaria con la compra de participación a JAM y PS.
                                </HitoCard>
                                <HitoCard title="Relación Institucional" icon="landmark">
                                    Vínculo positivo con el Ministerio de Vivienda, Serviu y participación líder en la CChC.
                                </HitoCard>
                                <div className="md:col-span-2 p-10 rounded-3xl text-white flex flex-col md:flex-row items-center justify-between overflow-hidden relative shadow-xl" style={{ backgroundColor: COLORS.navy }}>
                                    <div className="relative z-10 text-center md:text-left">
                                        <h3 className="text-3xl font-bold mb-2 tracking-tight">Giro Financiero Histórico</h3>
                                        <p className="text-slate-300 text-lg">
                                            <span className="text-white font-bold underline decoration-red-500 decoration-4 underline-offset-4" style={{ textDecorationColor: COLORS.red }}>M$ 5.069</span> de utilidad antes de impuestos
                                        </p>
                                        <p className="text-slate-400 text-xs mt-2 uppercase tracking-widest">vs M$ -8.731 en el ejercicio 2024</p>
                                    </div>
                                    <div className="text-[10rem] font-black opacity-10 absolute -right-8 pointer-events-none" style={{ color: COLORS.red }}>2025</div>
                                </div>
                            </div>
                        </section>

                        {/* INMOBILIARIO */}
                        <section id="inmobiliario" className="py-12 md:py-16 border-t border-slate-200">
                            <SectionHeading 
                                title="Gestión Inmobiliaria" 
                                subtitle="Acuerdos comerciales, nuevos proyectos y adjudicaciones" 
                            />
                            <div className="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6">
                                <div className="bg-white p-6 rounded-xl border-l-4 shadow-sm" style={{ borderLeftColor: COLORS.red }}>
                                    <h4 className="font-bold text-lg mb-4 flex items-center gap-2 text-slate-800"><Icon name="check-circle-2" className="text-emerald-500" size={18} /> Acuerdos de Compra</h4>
                                    <ul className="space-y-3 text-sm text-slate-600 font-medium">
                                        <li className="flex justify-between border-b border-slate-50 pb-1"><span>Vistamar - Coquimbo</span> <span className="font-bold text-slate-900 opacity-60">(Rendic)</span></li>
                                        <li className="flex justify-between border-b border-slate-50 pb-1"><span>Distrito Centro - Chillán</span> <span className="font-bold text-slate-900 opacity-60">(Basagoitia)</span></li>
                                        <li className="flex justify-between border-b border-slate-50 pb-1"><span>Alto La Serena</span> <span className="font-bold text-slate-900 opacity-60">(S. Lorca)</span></li>
                                        <li className="flex justify-between"><span>Serrano - Pto. Montt</span> <span className="font-bold text-slate-900 opacity-60">(M. Vargas)</span></li>
                                    </ul>
                                </div>
                                <div className="bg-white p-6 rounded-xl border-l-4 shadow-sm" style={{ borderLeftColor: COLORS.red }}>
                                    <h4 className="font-bold text-lg mb-4 flex items-center gap-2 text-slate-800"><Icon name="check-circle-2" className="text-emerald-500" size={18} /> Proyectos DS49/19</h4>
                                    <ul className="space-y-3 text-sm text-slate-600 font-medium">
                                        <li>• Implementación EP Épica</li>
                                        <li>• Postulación Lira IV (DS19)</li>
                                        <li>• La Compañía, Tocoral y Agua Santa</li>
                                        <li>• Aprobación Llacolén</li>
                                    </ul>
                                </div>
                                <div className="bg-white p-6 rounded-xl border-l-4 shadow-sm" style={{ borderLeftColor: COLORS.red }}>
                                    <h4 className="font-bold text-lg mb-4 flex items-center gap-2 text-slate-800"><Icon name="check-circle-2" className="text-emerald-500" size={18} /> Hitos de Venta</h4>
                                    <ul className="space-y-3 text-sm text-slate-600 font-medium">
                                        <li className="flex justify-between border-b border-slate-50 pb-1"><span>Padre Hurtado (Vivecoop)</span> <span className="font-bold text-red-600">540 mUF</span></li>
                                        <li>• Stock Arriendo Justo</li>
                                        <li>• Escrituración Proyectos varios</li>
                                    </ul>
                                </div>
                            </div>
                        </section>

                        {/* CONSTRUCCION & RENTAS */}
                        <section id="construccion" className="py-12 md:py-16 border-t border-slate-200">
                            <SectionHeading title="Construcción y Rentas" subtitle="Crecimiento en edificación y diversificación de ingresos." />
                            <div className="grid grid-cols-1 lg:grid-cols-2 gap-10">
                                <div className="space-y-4">
                                    <h3 className="font-bold text-xl mb-4 text-slate-700 flex items-center gap-2 uppercase tracking-tighter"><Icon name="hard-hat" /> Edificación</h3>
                                    <div className="p-4 bg-white rounded-lg border border-slate-100 flex items-center justify-between shadow-sm">
                                        <span className="text-sm">Ventas 2 obras DS19 (CONAVICOOP)</span>
                                        <span className="font-bold" style={{ color: COLORS.red }}>967 mUF</span>
                                    </div>
                                    <div className="p-4 bg-white rounded-lg border border-slate-100 flex items-center justify-between shadow-sm">
                                        <span className="text-sm">Ventas 2 obras DS49 (SERVIU)</span>
                                        <span className="font-bold" style={{ color: COLORS.red }}>876 mUF</span>
                                    </div>
                                    <div className="p-4 bg-white rounded-lg border border-slate-100 flex items-center justify-between shadow-sm">
                                        <span className="text-sm">Inicio Llacolén – Concepción</span>
                                        <span className="font-bold" style={{ color: COLORS.red }}>651 mUF</span>
                                    </div>
                                    <div className="p-4 bg-slate-100 border-2 border-dashed border-slate-200 rounded-lg text-center mt-4 py-4">
                                        <p className="text-sm font-bold text-slate-900">Productividad Líder 2025</p>
                                        <p className="text-xs text-slate-500 italic">Obra Mirador Mapocho - Ranking CChC</p>
                                    </div>
                                </div>
                                <div className="space-y-4">
                                    <h3 className="font-bold text-xl mb-4 text-slate-700 flex items-center gap-2 uppercase tracking-tighter"><Icon name="building-2" /> Rentas Inmobiliarias</h3>
                                    <HitoCard title="Venta RentaDep" icon="arrow-up-right" color={COLORS.red}>
                                        Transacción exitosa a AssetPlan por un total de M$ 700.
                                    </HitoCard>
                                    <HitoCard title="Subsidios DS52" icon="check-circle-2" color={COLORS.red}>
                                        Implementación exitosa de subsidios de arriendos para portafolio.
                                    </HitoCard>
                                </div>
                            </div>
                        </section>

                        {/* FINANZAS */}
                        <section id="finanzas" className="py-12 md:py-16 border-t border-slate-200">
                            <SectionHeading title="Consolidación de nueva estructura de Capital" subtitle="Gestión estratégica y cumplimiento de compromisos financieros." />
                            <div className="bg-white rounded-3xl overflow-hidden shadow-2xl border border-slate-100 grid grid-cols-1 lg:grid-cols-2">
                                <div className="p-10 text-white bg-slate-800">
                                    <h4 className="text-xl font-bold mb-8 flex items-center gap-2 uppercase tracking-widest"><Icon name="dollar-sign" /> Líneas de Crédito</h4>
                                    <div className="space-y-4">
                                        {[
                                            { label: "Financiamiento Stock (Moneda/BTG)", val: 935 },
                                            { label: "Refinanciamiento P. Cicarelli I", val: 440 },
                                            { label: "Línea G. Mackenna (ITAU)", val: 438 },
                                            { label: "Serrano (BCI)", val: 479 }
                                        ].map((item, i) => (
                                            <div key={i} className="flex justify-between items-center border-b border-white/5 pb-2">
                                                <span className="text-slate-400 text-xs flex-1">{item.label}</span>
                                                <span className="font-mono font-bold text-right min-w-[80px]" style={{ color: COLORS.red }}>{item.val} mUF</span>
                                            </div>
                                        ))}
                                        <div className="flex justify-between items-center pt-6 mt-4 border-t-2" style={{ borderColor: `${COLORS.red}40` }}>
                                            <span className="text-white font-bold text-sm uppercase">Total Financiamientos</span>
                                            <span className="font-mono text-2xl font-black text-right" style={{ color: COLORS.red }}>2.292 mUF</span>
                                        </div>
                                    </div>
                                </div>
                                <div className="p-10 space-y-5 flex flex-col justify-center bg-white">
                                    <div className="flex items-start gap-4 p-4 rounded-xl bg-slate-50 border border-slate-100">
                                        <div className="w-8 h-8 rounded-full flex items-center justify-center font-bold flex-shrink-0" style={{ backgroundColor: `${COLORS.red}15`, color: COLORS.red }}>1</div>
                                        <div><p className="font-bold text-slate-900 italic text-sm">Fondo Credicorp (salida y pago)</p><p className="text-[11px] text-slate-500">Monto total de UF 652 mil.</p></div>
                                    </div>
                                    <div className="flex items-start gap-4 p-4 rounded-xl bg-slate-50 border border-slate-100">
                                        <div className="w-8 h-8 rounded-full flex items-center justify-center font-bold flex-shrink-0" style={{ backgroundColor: `${COLORS.red}15`, color: COLORS.red }}>2</div>
                                        <div><p className="font-bold text-slate-900 italic text-sm leading-tight mb-1">Devolución MDI Dos</p><p className="text-[11px] text-slate-500">Retorno del 50% a inversionistas del fondo.</p></div>
                                    </div>
                                    <div className="flex items-start gap-4 p-4 rounded-xl bg-slate-50 border border-slate-100">
                                        <div className="w-8 h-8 rounded-full flex items-center justify-center font-bold flex-shrink-0" style={{ backgroundColor: `${COLORS.red}15`, color: COLORS.red }}>3</div>
                                        <div><p className="font-bold text-slate-900 italic text-sm">Pago de KP por UF 451 mil</p><p className="text-[11px] text-slate-500">Cumplido íntegramente según cronograma.</p></div>
                                    </div>
                                    <div className="flex items-start gap-4 p-4 rounded-xl bg-slate-50 border border-slate-100">
                                        <div className="w-8 h-8 rounded-full flex items-center justify-center font-bold flex-shrink-0" style={{ backgroundColor: `${COLORS.red}15`, color: COLORS.red }}>4</div>
                                        <div><p className="font-bold text-slate-900 italic text-sm">Mezzanine P.Cicarelli I</p><p className="text-[11px] text-slate-500">Implementación por UF 150 mil.</p></div>
                                    </div>
                                    <div className="flex items-start gap-4 p-4 rounded-xl bg-slate-50 border border-slate-100">
                                        <div className="w-8 h-8 rounded-full flex items-center justify-center font-bold flex-shrink-0" style={{ backgroundColor: `${COLORS.red}15`, color: COLORS.red }}>5</div>
                                        <div><p className="font-bold text-slate-900 italic text-sm leading-tight mb-1">Líneas SERVIU y Leasing</p><p className="text-[11px] text-slate-500">Garantías por 220 mUF y activos estratégicos.</p></div>
                                    </div>
                                </div>
                            </div>
                        </section>

                        {/* INTERNACIONAL & COMERCIAL */}
                        <div className="grid grid-cols-1 lg:grid-cols-2 gap-12 border-t border-slate-200 py-12 md:py-16">
                            <section id="internacional">
                                <SectionHeading title="Comenzamos proyectos en Miami" subtitle="Vientos dejan de soplar en contra." />
                                <div className="relative h-72 rounded-2xl overflow-hidden flex items-center justify-center shadow-xl border border-slate-100 group">
                                    <div className="absolute inset-0 bg-cover bg-center transition-transform duration-1000 group-hover:scale-110 opacity-80" style={{ backgroundImage: `url('https://cdn.prod.website-files.com/67808ac2eb0a5516b1754b20/68a34dc9f8f8321773292c23_SD_4.jpg')` }}></div>
                                    <div className="absolute inset-0 bg-gradient-to-t from-slate-900/60 to-transparent"></div>
                                    <div className="relative z-10 text-center p-6">
                                        <h3 className="text-2xl font-bold text-white mb-2 shadow-sm">The Edge at Sunset</h3>
                                        <p className="text-xs font-bold bg-white text-slate-900 px-4 py-1.5 rounded-full inline-block uppercase tracking-wider">Inicio de Obra y Cierre ALTA</p>
                                    </div>
                                </div>
                            </section>
                            <section id="comercial">
                                <SectionHeading title="Gestión Comercial" subtitle="Fortalecimiento del equipo y consolidación operacional." />
                                <div className="space-y-4">
                                    <HitoCard title="Nueva Estructura Gerencial" icon="users">
                                        Nombramiento de Santiago Prado como Gerente y llegada de nueva subgerencia enfocada en solidez operacional.
                                    </HitoCard>
                                    <HitoCard title="Optimización Operativa" icon="dollar-sign">
                                        Mejora sustancial en cobros de Mutuos y tiempos de escrituración.
                                    </HitoCard>
                                </div>
                            </section>
                        </div>

                        {/* PERSONAS */}
                        <section id="personas" className="py-12 md:py-16 border-t border-slate-200">
                            <SectionHeading title="Capital Humano y Cultura" subtitle="Bienestar y compromiso de nuestro activo más valioso." />
                            <div className="grid grid-cols-1 lg:grid-cols-3 gap-6">
                                <div className="p-8 rounded-3xl text-white shadow-lg flex flex-col justify-center items-center text-center transition-transform hover:scale-[1.02]" style={{ backgroundColor: COLORS.green }}>
                                    <Icon name="award" size={40} className="mb-6 opacity-40" />
                                    <h3 className="text-5xl font-black mb-2 italic">79%</h3>
                                    <p className="font-bold text-lg mb-2">Clima Laboral</p>
                                    <p className="text-xs text-green-50">Resultado sobresaliente sobre el mercado Maestra.</p>
                                </div>
                                <div className="bg-white p-8 rounded-3xl border border-slate-100 lg:col-span-2 shadow-sm">
                                    <h4 className="font-bold text-xl mb-8 flex items-center gap-3 text-slate-800 uppercase tracking-tighter">
                                        <Icon name="users" style={{ color: COLORS.red }} /> Cultura Maestra
                                    </h4>
                                    <div className="grid grid-cols-1 sm:grid-cols-2 gap-8 text-[12px]">
                                        <div className="space-y-4">
                                            <p><span className="font-bold block text-slate-900 uppercase">Coaching Ejecutivo:</span> Nota 4.32 / 5.0 - Programa completado exitosamente.</p>
                                            <p><span className="font-bold block text-slate-900 uppercase">Comunicación:</span> Newsletters video, Jornada Comunicacional y Espíritu Maestra.</p>
                                        </div>
                                        <div className="space-y-4">
